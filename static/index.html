<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WanderWise | AI Travel Planner</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.85);
      --panel-border: rgba(148, 163, 184, 0.2);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #f59e0b;
      --accent-2: #10b981;
      --line: rgba(148, 163, 184, 0.15);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: 
        radial-gradient(circle at 0% 0%, rgba(245, 158, 11, 0.15), transparent 40%),
        radial-gradient(circle at 100% 0%, rgba(16, 185, 129, 0.1), transparent 40%),
        #020617;
      line-height: 1.5;
    }

    .shell {
      width: min(1200px, calc(100% - 40px));
      margin: 0 auto;
      padding: 40px 0 60px;
    }

    .header-area {
      margin-bottom: 40px;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.3em;
      font-size: 0.7rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(to bottom right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .lede {
      max-width: 65ch;
      margin-top: 20px;
      color: var(--muted);
      font-size: 1.1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 32px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      padding: 32px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }

    .panel h2 {
      margin: 0 0 24px;
      font-size: 1.25rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel h2::before {
      content: "";
      width: 4px;
      height: 20px;
      background: var(--accent);
      border-radius: 4px;
    }

    form { display: grid; gap: 20px; }
    
    .field-group { display: grid; gap: 8px; }
    .field-group label { font-size: 0.85rem; font-weight: 600; color: var(--muted); }
    
    input, select, button {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      color: #fff;
      padding: 12px 16px;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(30, 41, 59, 0.8);
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
    }

    button {
      background: linear-gradient(135deg, var(--accent), #f97316);
      color: #000;
      font-weight: 700;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
      box-shadow: 0 10px 20px rgba(245, 158, 11, 0.2);
    }

    button:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }

    .results-area { display: grid; gap: 24px; }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .hotel-card {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 20px;
      align-items: center;
      border-left: 4px solid var(--accent-2);
    }

    .hotel-img {
      width: 120px;
      height: 120px;
      border-radius: 16px;
      object-fit: cover;
      background: #1e293b;
    }

    .hotel-info h3 { margin: 0 0 4px; font-size: 1.2rem; }
    .hotel-meta { font-size: 0.9rem; color: var(--muted); }

    .day-section { margin-bottom: 24px; }
    .day-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .day-header h3 { margin: 0; font-size: 1.1rem; color: var(--accent); }
    .day-summary { font-size: 0.95rem; color: #cbd5e1; font-style: italic; margin-bottom: 20px; }

    .itinerary-list { display: grid; gap: 16px; }
    
    .entry {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 16px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      border: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .entry:hover { border-color: var(--line); }

    .entry-time {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--muted);
      text-align: right;
      padding-top: 2px;
    }

    .entry-main {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 16px;
      align-items: start;
    }

    .entry-thumb {
      width: 100px;
      height: 100px;
      border-radius: 12px;
      object-fit: cover;
      background: #1e293b;
    }

    .entry-content h4 { margin: 0 0 4px; font-size: 1rem; color: #fff; }
    .entry-meta { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
    .entry-justification {
      font-size: 0.88rem;
      color: #94a3b8;
      border-left: 2px solid var(--line);
      padding-left: 12px;
      margin-top: 8px;
    }

    .meal-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      margin-right: 8px;
      background: rgba(16, 185, 129, 0.1);
      color: var(--accent-2);
    }

    .travel-tag {
      display: inline-block;
      font-size: 0.75rem;
      color: var(--accent);
      background: rgba(245, 158, 11, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 8px;
    }

    .footer-summary {
      display: flex;
      justify-content: space-around;
      padding: 20px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 16px;
      text-align: center;
      margin-top: 20px;
    }
    .footer-stat { display: grid; gap: 4px; }
    .footer-stat span:first-child { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; font-weight: 700; }
    .footer-stat span:last-child { font-size: 1.1rem; font-weight: 800; }

    .loading-spinner {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }

    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
      padding: 16px;
      border-radius: 12px;
      font-size: 0.9rem;
      margin-top: 20px;
      display: none;
    }

    @media (max-width: 1000px) {
      .grid { grid-template-columns: 1fr; }
      .hotel-card { grid-template-columns: 1fr; text-align: center; }
      .hotel-img { margin: 0 auto; }
      .entry-main { grid-template-columns: 1fr; }
      .entry-thumb { width: 100%; height: 150px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="header-area">
      <p class="eyebrow">WanderWise AI Planner</p>
      <h1>Intelligent travel, <br/>beautifully planned.</h1>
      <p class="lede">
        Our OpenAI-powered engine creates detailed, logical, and budget-conscious itineraries based on your personal travel style.
      </p>
    </header>

    <div class="grid">
      <aside class="panel">
        <h2>Trip Parameters</h2>
        <form id="itinerary-form">
          <div class="field-group">
            <label>Destination City</label>
            <input name="city" value="Belagavi" required />
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="field-group">
              <label>Start Date</label>
              <input name="trip_start_date" type="date" value="2025-05-04" required />
            </div>
            <div class="field-group">
              <label>Trip Days</label>
              <input name="num_days" type="number" min="1" value="3" required />
            </div>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="field-group">
              <label>People</label>
              <input name="num_people" type="number" min="1" value="3" required />
            </div>
            <div class="field-group">
              <label>Budget Tier</label>
              <select name="budget_tier">
                <option>Low</option>
                <option selected>Medium</option>
                <option>High</option>
              </select>
            </div>
          </div>
          <div class="field-group">
            <label>Trip Theme</label>
            <select name="theme">
              <option selected>Historical</option>
              <option>Devotional</option>
              <option>Adventure</option>
              <option>Entertainment</option>
            </select>
          </div>
          <div class="field-group">
            <label>Travel Type</label>
            <select name="travel_type">
              <option>Solo</option>
              <option>Couple</option>
              <option selected>Friends</option>
              <option>Family</option>
            </select>
          </div>
          <div class="field-group">
            <label>Total Budget (INR)</label>
            <input name="total_budget" type="number" min="0" value="15000" required />
          </div>
          <button id="submit-btn" type="submit">Build My Trip</button>
        </form>
        <div id="error-display" class="error-box"></div>
      </aside>

      <div id="results-display" class="results-area">
        <div class="panel" style="text-align: center; padding: 60px 40px; color: var(--muted);">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom: 16px; opacity: 0.5;">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
            <circle cx="12" cy="10" r="3"></circle>
          </svg>
          <p>Fill in your trip details and click "Build My Trip" to see your AI-generated itinerary.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('itinerary-form');
    const resultsArea = document.getElementById('results-display');
    const errorBox = document.getElementById('error-display');
    const submitBtn = document.getElementById('submit-btn');

    function escapeHtml(v) {
      if (!v) return '';
      return String(v).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    }

    function renderItinerary(data) {
      const hotelImg = data.hotel.image_url ? `<img src="${data.hotel.image_url}" class="hotel-img" alt="${escapeHtml(data.hotel.name)}" />` : '';
      
      const hotelHtml = `
        <div class="card hotel-card">
          ${hotelImg}
          <div class="hotel-info">
            <p class="eyebrow">Recommended Hotel</p>
            <h3>${escapeHtml(data.hotel.name)}</h3>
            <div class="hotel-meta">
              <span>★ ${data.hotel.rating}</span> • 
              <span>${escapeHtml(data.hotel.address)}</span>
            </div>
          </div>
          <div style="text-align: right">
            <div style="font-weight: 800; font-size: 1.1rem;">₹${data.hotel.cost_per_night}</div>
            <div style="font-size: 0.7rem; color: var(--muted); text-transform: uppercase;">Per Night</div>
          </div>
        </div>
      `;

      const daysHtml = data.days.map(day => {
        const entriesHtml = day.itinerary.map(entry => {
          const mealTag = entry.meal_type ? `<span class="meal-badge">${escapeHtml(entry.meal_type)}</span>` : '';
          const travelTime = entry.travel_time_from_previous ? `<span class="travel-tag">🚗 ${entry.travel_time_from_previous} min travel</span>` : '';
          const thumb = entry.image_url ? `<img src="${entry.image_url}" class="entry-thumb" alt="${escapeHtml(entry.location_name)}" />` : '';
          
          return `
            <div class="entry">
              <div class="entry-time">${escapeHtml(entry.arrival_time)}</div>
              <div class="entry-main">
                ${thumb}
                <div class="entry-content">
                  <h4>${mealTag}${escapeHtml(entry.location_name)} ${travelTime}</h4>
                  <div class="entry-meta">
                    ${escapeHtml(entry.category)} • 
                    Cost: ₹${entry.cost}
                  </div>
                  ${entry.ai_justification ? `<div class="entry-justification">${escapeHtml(entry.ai_justification)}</div>` : ''}
                </div>
              </div>
            </div>
          `;
        }).join('');

        return `
          <div class="day-section">
            <div class="day-header">
              <h3>Day ${day.day} — ${escapeHtml(day.date)}</h3>
              <div style="font-weight: 700; color: var(--muted); font-size: 0.9rem;">₹${day.day_cost}</div>
            </div>
            ${day.day_summary ? `<p class="day-summary">${escapeHtml(day.day_summary)}</p>` : ''}
            <div class="itinerary-list">
              ${entriesHtml || '<p style="color: var(--muted); font-style: italic;">No activities planned for this day.</p>'}
            </div>
          </div>
        `;
      }).join('');

      const summaryHtml = `
        <div class="footer-summary">
          <div class="footer-stat">
            <span>Total Cost</span>
            <span style="color: ${data.summary.within_budget ? 'var(--accent-2)' : '#f87171'}">₹${data.summary.total_cost}</span>
          </div>
          <div class="footer-stat">
            <span>Budget Limit</span>
            <span>₹${data.summary.budget_limit}</span>
          </div>
          <div class="footer-stat">
            <span>Status</span>
            <span style="color: ${data.summary.within_budget ? 'var(--accent-2)' : '#f87171'}">${data.summary.within_budget ? 'Under Budget' : 'Over Budget'}</span>
          </div>
        </div>
      `;

      resultsArea.innerHTML = `
        ${hotelHtml}
        <div class="card" style="padding: 32px;">
          ${daysHtml}
          ${summaryHtml}
        </div>
      `;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Analyzing & Planning...';
      resultsArea.innerHTML = `<div class="panel loading-spinner">
        <p>Searching Google Maps for the best spots...</p>
        <p style="font-size: 0.8rem; margin-top: 10px;">Consulting AI for the perfect schedule...</p>
      </div>`;

      try {
        const formData = new FormData(form);
        const payload = Object.fromEntries(formData.entries());
        payload.num_days = parseInt(payload.num_days);
        payload.num_people = parseInt(payload.num_people);
        payload.total_budget = parseInt(payload.total_budget);

        const res = await fetch('/api/generate-itinerary', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Failed to generate plan');
        
        renderItinerary(data);
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = 'block';
        resultsArea.innerHTML = `<div class="panel" style="text-align: center; color: var(--muted); padding: 40px;">Failed to generate plan. Please check your API keys and try again.</div>`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Build My Trip';
      }
    });
  </script>
</body>
</html>
